<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Theme contract (anti-flash): set data-theme before any styles load. -->
    <script>
      (function () {
        const saved = localStorage.getItem('theme')
        document.documentElement.setAttribute('data-theme', saved ?? 'dark')
      })()
    </script>
    <title>Entropy Collapse — crypto-lab</title>
    <meta
      name="description"
      content="A real HMAC_DRBG (NIST SP 800-90A) shows how two machines with the same seed emit identical nonces and keys, and how low-entropy seeds are brute-forced."
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>"
    />
  </head>
  <body>
    <!-- Shared top bar (canonical crypto-lab bar; owns branding + theme toggle). -->
    <header class="cl-topbar" role="banner">
      <a class="cl-skip" href="#app">Skip to content</a>
      <a class="cl-topbar-brand" href="https://crypto-lab.systemslibrarian.dev/">Crypto&nbsp;Lab</a>
      <nav class="cl-topbar-actions" aria-label="Site">
        <a
          class="cl-topbar-link"
          href="https://github.com/systemslibrarian/crypto-lab-entropy-collapse"
          >GitHub</a
        >
        <button id="cl-theme-toggle" type="button" class="cl-topbar-toggle" aria-pressed="false">
          <span aria-hidden="true" class="cl-toggle-icon">🌙</span>
          <span class="cl-toggle-text">Dark</span>
        </button>
      </nav>
    </header>

    <main id="app"></main>

    <footer class="scripture-footer">
      <p>
        So whether you eat or drink or whatever you do, do it all for the glory of God. — 1
        Corinthians 10:31
      </p>
    </footer>

    <!-- Shared top bar behaviour: flip + persist data-theme. -->
    <script>
      (function () {
        const html = document.documentElement
        const btn = document.getElementById('cl-theme-toggle')
        if (!btn) return
        const sync = () => {
          const light = html.getAttribute('data-theme') === 'light'
          btn.setAttribute('aria-pressed', String(light))
          const icon = btn.querySelector('.cl-toggle-icon')
          const text = btn.querySelector('.cl-toggle-text')
          if (icon) icon.textContent = light ? '☀️' : '🌙'
          if (text) text.textContent = light ? 'Light' : 'Dark'
          btn.setAttribute('aria-label', light ? 'Switch to dark theme' : 'Switch to light theme')
        }
        btn.addEventListener('click', () => {
          const light = html.getAttribute('data-theme') === 'light'
          const next = light ? 'dark' : 'light'
          html.setAttribute('data-theme', next)
          localStorage.setItem('theme', next)
          sync()
        })
        sync()
      })()
    </script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
